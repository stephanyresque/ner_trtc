# vLLM (OpenAI-compatible) para os modelos de TEXTO do Experimento D — UM perfil de cada vez (12 GB).
# Subir:  docker compose --profile qwen35 up -d   |   docker compose --profile llama32 up -d
# Modelos de TEXTO: SEM flags de imagem. bf16, precisão cheia (4B cabe em ~8 GB; sem quantizar).
services:
  vllm-qwen35:
    image: vllm/vllm-openai:${VLLM_TAG:-v0.11.0}
    profiles: ["qwen35"]
    ipc: host
    ports: ["8000:8000"]
    volumes:
      - /mnt/hd/ceia/user_stephany:/workspace          # pesos caem aqui, não no root
    environment:
      HF_HOME: /workspace/hf_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --model
      - Qwen/Qwen3-4B-Instruct-2507                     # Qwen3ForCausalLM, texto puro, não-pensante
      - --served-model-name
      - qwen3-4b
      - --dtype
      - bfloat16
      - --gpu-memory-utilization
      - "0.80"
      - --max-model-len
      - "4096"
      - --trust-remote-code

  vllm-llama32:
    image: vllm/vllm-openai:${VLLM_TAG:-v0.11.0}
    profiles: ["llama32"]
    ipc: host
    ports: ["8000:8000"]
    volumes:
      - /mnt/hd/ceia/user_stephany:/workspace
    environment:
      HF_HOME: /workspace/hf_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --model
      - meta-llama/Llama-3.2-3B-Instruct                # LlamaForCausalLM, texto puro, não-gated
      - --served-model-name
      - llama-3.2-3b
      - --dtype
      - bfloat16
      - --gpu-memory-utilization
      - "0.80"
      - --max-model-len
      - "4096"
      - --trust-remote-code
