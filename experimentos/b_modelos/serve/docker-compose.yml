# vLLM (OpenAI-compatible) para os VLMs do Experimento B — UM perfil de cada vez (12 GB).
# Subir:  docker compose --profile qwen up -d   |   docker compose --profile glm up -d
# A tag pode ser sobrescrita: VLLM_TAG=nightly docker compose --profile glm up -d
services:
  vllm-qwen:
    image: vllm/vllm-openai:${VLLM_TAG:-v0.11.0}      # Qwen3-VL exige vLLM >= 0.11.0
    profiles: ["qwen"]
    ipc: host
    ports: ["8000:8000"]
    volumes:
      - /mnt/hd/ceia/user_stephany:/workspace          # pesos caem aqui, não no root
    environment:
      HF_HOME: /workspace/hf_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --model
      - Qwen/Qwen3-VL-4B-Instruct-FP8
      - --served-model-name
      - qwen3-vl-4b
      - --gpu-memory-utilization
      - "0.80"
      - --max-model-len
      - "4096"
      - --limit-mm-per-prompt
      - '{"image":1,"video":0}'
      - --media-io-kwargs
      - '{"video":{"num_frames":0}}'
      - --mm-processor-kwargs
      - '{"max_pixels":1003520}'
      - --max-num-seqs
      - "1"
      - --trust-remote-code

  vllm-glm:
    image: vllm/vllm-openai:${VLLM_TAG:-v0.11.0}      # GLM-OCR pode exigir tag mais nova (transformers>=5); bump via VLLM_TAG
    profiles: ["glm"]
    ipc: host
    ports: ["8000:8000"]
    volumes:
      - /mnt/hd/ceia/user_stephany:/workspace
    environment:
      HF_HOME: /workspace/hf_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --model
      - zai-org/GLM-OCR
      - --served-model-name
      - glm-ocr
      - --gpu-memory-utilization
      - "0.90"
      - --max-model-len
      - "8192"
      - --limit-mm-per-prompt
      - image=2
      - --trust-remote-code
